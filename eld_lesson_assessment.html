<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="page-title">ELD Lesson Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;--coral:#D85A30;--coral-light:#FAECE7;--purple:#534AB7;--purple-light:#EEEDFE;--amber:#BA7517;--amber-light:#FAEEDA;--green:#3B6D11;--green-light:#EAF3DE;--red:#A32D2D;--red-light:#FCEBEB;--gray-100:#F1EFE8;--gray-200:#D3D1C7;--gray-500:#5F5E5A;--gray-900:#2C2C2A;--radius:12px;--radius-sm:8px;--shadow:0 2px 16px rgba(0,0,0,.08);--font:'Nunito',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#f7f8fa;color:var(--gray-900);min-height:100vh;padding-bottom:3rem;}
.mode-badge{position:fixed;top:12px;right:12px;z-index:100;color:white;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;}
.mode-formative{background:var(--teal);}
.mode-summative{background:var(--purple);}
.header{padding:2rem 1.5rem 3rem;text-align:center;color:white;}
.header h1{font-size:1.5rem;font-weight:800;margin-bottom:.25rem;}
.header p{font-size:.9rem;opacity:.85;}
.lesson-tag{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:3px 14px;font-size:.8rem;font-weight:700;margin-top:.5rem;}
.progress-wrap{max-width:580px;margin:-1.5rem auto 0;padding:0 1rem;position:relative;z-index:10;}
.progress-card{background:white;border-radius:var(--radius);padding:1rem 1.25rem;box-shadow:var(--shadow);}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gray-500);margin-bottom:6px;font-weight:600;}
.progress-bar{height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease;background:var(--teal);}
.tier-dots{display:flex;gap:4px;margin-top:8px;justify-content:center;flex-wrap:wrap;}
.tier-dot{width:7px;height:7px;border-radius:50%;background:var(--gray-200);}
.tier-dot.active{background:var(--teal);}
.tier-dot.done{background:var(--teal-dark);}
main{max-width:580px;margin:1.5rem auto;padding:0 1rem;}
.screen{display:none;}
.screen.active{display:block;}
.card{background:white;border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1rem;}
.tier-banner{border-radius:var(--radius);padding:.75rem 1.25rem;margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem;}
.question-num{font-size:12px;color:var(--gray-500);margin-bottom:.4rem;font-weight:700;}
.question-text{font-size:1rem;font-weight:700;line-height:1.5;margin-bottom:1.25rem;}
.native-hint{font-size:.85rem;color:var(--purple);background:var(--purple-light);padding:6px 12px;border-radius:var(--radius-sm);margin-bottom:1rem;font-weight:600;display:flex;align-items:center;gap:6px;}
.vocab-image{width:100%;max-width:220px;height:160px;object-fit:contain;border-radius:var(--radius);margin:0 auto 1rem;display:block;box-shadow:var(--shadow);background:#f5f5f5;}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{border:2px solid var(--gray-200);border-radius:var(--radius-sm);padding:.75rem 1rem;cursor:pointer;font-family:var(--font);font-size:.95rem;font-weight:600;text-align:left;background:white;color:var(--gray-900);transition:all .15s;display:flex;align-items:center;gap:10px;width:100%;}
.opt:hover:not(:disabled){border-color:var(--teal);background:var(--teal-light);}
.opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
.opt.incorrect{border-color:var(--red);background:var(--red-light);color:var(--red);}
.opt-letter{width:24px;height:24px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.img-opt{border:2px solid var(--gray-200);border-radius:var(--radius);cursor:pointer;background:white;overflow:hidden;transition:all .15s;padding:0;display:block;width:100%;text-align:left;}
.img-opt:hover:not(:disabled){border-color:var(--teal);}
.img-opt.correct{border-color:var(--green);box-shadow:0 0 0 2px var(--green);}
.img-opt.incorrect{border-color:var(--red);}
.img-opt img{width:100%;display:block;}
.img-opt-label{font-size:.75rem;font-weight:700;text-align:center;padding:4px;color:var(--gray-500);}
.feedback-box{border-radius:var(--radius);padding:1rem 1.25rem;margin-top:1rem;animation:fadeIn .4s ease;}
.fb-correct{background:var(--green-light);border:1px solid #C0DD97;}
.fb-incorrect{background:var(--coral-light);border:1px solid #F0997B;}
.fb-neutral{background:var(--amber-light);border:1px solid #FAC775;}
.fb-loading{background:var(--gray-100);border:1px dashed var(--gray-200);}
.fb-header{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;}
.fb-text{font-size:.9rem;line-height:1.6;}
.fb-native{font-size:.85rem;color:var(--purple);margin-top:.5rem;font-weight:600;border-top:1px solid rgba(83,74,183,.15);padding-top:.5rem;}
.record-wrap{display:flex;flex-direction:column;align-items:center;gap:.75rem;padding:.75rem 0;}
.record-btn{width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;font-size:1.6rem;transition:all .2s;font-family:var(--font);}
.record-idle{background:var(--teal-light);color:var(--teal);}
.record-recording{background:var(--red-light);color:var(--red);animation:pulse 1s infinite;}
.record-done{background:var(--green-light);color:var(--green);}
.record-status{font-size:12px;font-weight:700;color:var(--gray-500);}
.record-timer{font-size:1.2rem;font-weight:800;color:var(--teal);font-variant-numeric:tabular-nums;}
textarea,select,input[type=text]{width:100%;border:2px solid var(--gray-200);border-radius:var(--radius-sm);padding:.75rem;font-family:var(--font);font-size:.95rem;background:white;color:var(--gray-900);}
textarea:focus,select:focus,input[type=text]:focus{outline:none;border-color:var(--teal);}
textarea{min-height:80px;resize:vertical;}
.nav-row{display:flex;gap:10px;margin-top:1rem;}
.btn{flex:1;padding:.8rem;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--teal);color:white;}
.btn-primary:hover{background:var(--teal-dark);}
.btn-primary:disabled{background:var(--gray-200);color:var(--gray-500);cursor:not-allowed;}
.btn-secondary{background:white;border:2px solid var(--gray-200);color:var(--gray-900);}
.btn-secondary:hover{border-color:var(--teal);color:var(--teal);}
.intro-card{background:white;border-radius:var(--radius);padding:2rem 1.5rem;box-shadow:var(--shadow);text-align:center;margin-top:2rem;}
.intro-card h2{font-size:1.3rem;font-weight:800;color:var(--teal-dark);margin-bottom:.5rem;}
.intro-card p{font-size:.9rem;color:var(--gray-500);line-height:1.7;margin-bottom:1rem;}
.field{margin-bottom:.75rem;text-align:left;}
.field label{font-size:12px;font-weight:700;color:var(--gray-500);display:block;margin-bottom:4px;}
.complete-card{background:white;border-radius:var(--radius);padding:2rem 1.5rem;box-shadow:var(--shadow);text-align:center;}
.score-big{font-size:3rem;font-weight:800;color:var(--teal);line-height:1;}
.score-sub{font-size:1.1rem;font-weight:700;color:var(--gray-500);margin:.25rem 0 1rem;}
.spinner{width:20px;height:20px;border:2px solid var(--gray-200);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@media(max-width:480px){.header h1{font-size:1.2rem;}}
</style>
</head>

<div class="mode-badge" id="mode-badge"></div>
<div class="header" id="main-header" style="background:linear-gradient(135deg,#085041,#1D9E75);">

    <div class="tier-dots" id="tier-dots"></div>
  </div>
</div>
<main>

<div class="screen active" id="screen-intro">

      <label style="font-size:12px;font-weight:700;color:var(--gray-500);white-space:nowrap;">My language:</label>
      <select id="lang-select">
        <option value="" disabled selected style="color:#999;font-style:italic;">Choose your language...</option>
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="zh">中文</option>
        <option value="vi">Tiếng Việt</option>
        <option value="tl">Filipino</option>
        <option value="ko">한국어</option>
        <option value="ar">العربية</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="hi">हिन्दी</option>
        <option value="ne">नेपाली</option>
      </select>
    </div>
    <div class="field"><label>Your name:</label><input type="text" id="student-name" placeholder="First Last"></div>
    <div class="field"><label>Period:</label>

        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option>
      </select>
    </div>
    <div class="nav-row" style="margin-top:1.5rem;">
      <button class="btn btn-primary" onclick="startAssessment()">Start →</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-question">
  <div id="tier-banner" class="tier-banner"></div>
  <div class="card" id="question-card"></div>
  <div id="feedback-area"></div>
  <div class="nav-row">
    <button class="btn btn-secondary" onclick="goBack()">← Back</button>
    <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>Next →</button>
  </div>
</div>

<div class="screen" id="screen-complete">
  <div class="complete-card">
    <div style="font-size:3.5rem;margin-bottom:1rem;">🎉</div>
    <h2 style="font-size:1.3rem;font-weight:800;color:var(--teal-dark);margin-bottom:.5rem;">Lesson Complete!</h2>
    <div class="score-big" id="final-score">—</div>
    <div class="score-sub" id="final-pct"></div>
    <p style="font-size:.85rem;color:var(--gray-500);margin-bottom:1.5rem;">Your teacher will see your responses.</p>
    <a id="retry-link" href="#" style="display:inline-block;background:var(--teal-light);color:var(--teal-dark);padding:.6rem 1.5rem;border-radius:8px;font-weight:700;text-decoration:none;font-size:.9rem;">Try again →</a>
  </div>
</div>

</main>

function buildQuestions() {
  const shuffle = arr => [...arr].sort(() => Math.random() - .5);
  const others = unitVocab.filter(w => w.lesson_num !== LESSON);
  const qs = [];

  // Tier 1: Image pick — show 4 images, tap the correct word
  const withImages = lessonVocab.filter(w => w.image_url);
  shuffle(withImages).slice(0, 4).forEach((word, i) => {
    const distractors = shuffle(unitVocab.filter(w => w.word_id !== word.word_id && w.image_url)).slice(0, 3);
    const opts = shuffle([{...word, isCorrect:true}, ...distractors]);
    qs.push({id:'t1_img_'+i, tier:1, type:'image-pick', word, opts, label:'Image Match'});
  });

  // Tier 1: Native match — see native word, pick English
  shuffle(lessonVocab).slice(0, 3).forEach((word, i) => {
    const distractors = shuffle(unitVocab.filter(w => w.word_id !== word.word_id)).slice(0, 3);
    const opts = shuffle([word, ...distractors]);
    qs.push({id:'t1_nat_'+i, tier:1, type:'native-match', word, opts, label:'Word Match'});
  });

  // Tier 2: Fill-in sentence
  shuffle(lessonVocab).slice(0, 3).forEach((word, i) => {
    const sentence = FILL[word.word] || 'I use the word ___ at school.';
    const distractors = shuffle(unitVocab.filter(w => w.word_id !== word.word_id)).slice(0, 3);
    const opts = shuffle([word, ...distractors]);
    qs.push({id:'t2_fill_'+i, tier:2, type:'fill-in', word, sentence, opts, label:'Fill in the Blank'});
  });

  // Tier 3: Writing
  qs.push({id:'t3_write', tier:3, type:'vocab-write', wordBank:lessonVocab.map(w=>w.word), label:'Writing'});

  // Sort: T1, T2, T3
  const t1 = shuffle(qs.filter(q=>q.tier===1)).slice(0,5);
  const t2 = shuffle(qs.filter(q=>q.tier===2)).slice(0,3);
  const t3 = qs.filter(q=>q.tier===3);
  QUESTIONS = [...t1, ...t2, ...t3];
}

function renderQuestion(q) {
  document.getElementById('question-card').innerHTML = '';
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('btn-next').disabled = true;

  const banner = document.getElementById('tier-banner');
  const tc = [{},{bg:'#DBEAFE',color:'#1d4ed8',e:'🔤',l:'Tier 1 — Word Level'},{bg:'#EDE9FE',color:'#7c3aed',e:'📝',l:'Tier 2 — Sentence Level'},{bg:'#FFEDD5',color:'#c2410c',e:'✍️',l:'Tier 3 — Writing'}][q.tier];
  banner.style.background = tc.bg;
  banner.innerHTML = '<span style="font-size:1.1rem;">' + tc.e + '</span><span style="font-size:.82rem;font-weight:800;color:'+tc.color+';text-transform:uppercase;letter-spacing:.05em;">'+tc.l+'</span><span style="margin-left:auto;font-size:.75rem;color:'+tc.color+';opacity:.7;">Q'+(state.currentQ+1)+'/'+QUESTIONS.length+'</span>';

  let html = '<div class="question-num">Question ' + (state.currentQ+1) + ' of ' + QUESTIONS.length + '</div>';

  // Native hint
  const lang = state.lang;
  if (lang !== 'en' && q.word) {
    const col = LANG_COL[lang];
    const tr = col && q.word[col];
    if (tr) html += '<div class="native-hint">🌍 ' + tr + '</div>';
  }

  if (q.type === 'image-pick') html += renderImagePick(q);
  else if (q.type === 'native-match') html += renderNativeMatch(q);
  else if (q.type === 'fill-in') html += renderFillIn(q);
  else if (q.type === 'vocab-write') html += renderWrite(q);

  document.getElementById('question-card').innerHTML = html;
  if (state.answers[q.id]) restoreAnswer(q);
  updateProgress();
}

function renderImagePick(q) {
  let html = '<div class="question-text">Tap the picture for: <strong>' + q.word.word + '</strong></div>';
  html += '<div class="img-grid" id="img-grid">';
  q.opts.forEach(function(opt, i) {
    if (opt.image_url) {
      html += '<button class="img-opt" data-qid="' + q.id + '" data-chosen="' + opt.word_id + '" data-correct="' + q.word.word_id + '" onclick="handleImgClick(this)">'
        + '<img src="' + opt.image_url + '" alt="' + opt.word + '" loading="lazy">'
        + '</button>';
    }
  });
  html += '</div>';
  return html;
}

function handleImgClick(btn) {
  var qid = btn.dataset.qid;
  var chosenId = btn.dataset.chosen;
  var correctId = btn.dataset.correct;
  selectImg(qid, chosenId, correctId);
}

function renderNativeMatch(q) {
  var lang = state.lang !== 'en' ? state.lang : 'es';
  var col = LANG_COL[lang] || 'tr_es';
  var nw = q.word[col] || q.word.tr_es || '?';
  var letters = ['A','B','C','D'];
  var html = '<div class="question-text">Which English word matches this?</div>';
  html += '<div class="native-hint" style="font-size:1.1rem;justify-content:center;"><strong>' + nw + '</strong></div>';
  html += '<div class="options" style="margin-top:1rem;">';
  q.opts.forEach(function(opt, i) {
    html += '<button class="opt" data-qid="' + q.id + '" data-chosen="' + opt.word_id + '" data-correct="' + q.word.word_id + '" onclick="handleMCClick(this)">'
      + '<span class="opt-letter">' + letters[i] + '</span>' + opt.word + '</button>';
  });
  html += '</div>';
  return html;
}

function renderFillIn(q) {
  var letters = ['A','B','C','D'];
  var sentence = q.sentence.replace('___', '<span style="background:#FEF3C7;padding:2px 6px;border-radius:4px;font-style:italic;">______</span>');
  var html = '<div class="question-text">Choose the word that completes the sentence:</div>';
  html += '<div class="question-text" style="color:var(--teal-dark);font-size:.95rem;margin-bottom:1.25rem;">"' + sentence + '"</div>';
  if (q.word.image_url) html += '<img src="' + q.word.image_url + '" class="vocab-image" alt="' + q.word.word + '" loading="lazy">';
  html += '<div class="options">';
  q.opts.forEach(function(opt, i) {
    html += '<button class="opt" data-qid="' + q.id + '" data-chosen="' + opt.word_id + '" data-correct="' + q.word.word_id + '" onclick="handleMCClick(this)">'
      + '<span class="opt-letter">' + letters[i] + '</span>' + opt.word + '</button>';
  });
  html += '</div>';
  return html;
}

function renderWrite(q) {
  let html = '<div class="question-text">Write 1–3 sentences using at least 3 of these words:</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;">';
  q.wordBank.forEach(function(w, i) {
    html += '<button class="wb-btn" data-word="' + w + '" data-idx="' + i + '" onclick="handleWBClick(this)" style="background:var(--purple-light);color:var(--purple);border:none;border-radius:20px;padding:4px 12px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:var(--font);">' + w + '</button>';
  });
  html += '<div class="field"><label>Your writing:</label><textarea id="written-response" placeholder="Write here..." rows="4"></textarea></div>';
  html += '<div class="card" style="margin:.5rem 0;background:var(--teal-light);border:1px solid #9FE1CB;padding:1rem;">';
  html += '<div style="font-size:10px;font-weight:800;color:var(--teal-dark);text-transform:uppercase;margin-bottom:.5rem;">🎙 Optional: Record your answer</div>';
  html += '<div class="record-wrap"><div class="record-timer" id="rec-timer">0:00</div>';
  html += '<button class="record-btn record-idle" id="rec-btn" onclick="toggleRecording()">🎙</button>';
  html += '<div class="record-status" id="rec-status">Tap to record</div>';
  html += '<audio id="audio-playback" controls style="display:none;width:100%;margin-top:.5rem;"></audio></div></div>';
  html += '<button class="btn btn-primary" style="width:100%;" onclick="submitWritten()">' + (IS_FORMATIVE ? 'Submit & Get Feedback' : 'Submit Answer') + '</button>';
  return html;
}

// ── INTERACTIONS ─────────────────────────────────────────
function handleMCClick(btn) {
  var qid = btn.dataset.qid;
  var chosenId = btn.dataset.chosen;
  var correctId = btn.dataset.correct;
  selectMC(qid, chosenId, correctId);
}

function selectImg(qid, chosenId, correctId) {
  document.querySelectorAll('.img-opt').forEach(o => { o.disabled = true; });
  const isCorrect = chosenId === correctId;
  document.querySelectorAll('.img-opt').forEach(o => {
    if (o.dataset.chosen === chosenId) o.classList.add(isCorrect ? 'correct' : 'incorrect');
    if (!isCorrect && o.dataset.chosen === correctId) o.classList.add('correct');
  });
  state.answers[qid] = {value:chosenId, correct:isCorrect, score:isCorrect?1:0};
  document.getElementById('btn-next').disabled = false;
  const q = QUESTIONS.find(q => q.id === qid);
  if (IS_FORMATIVE) {
    getAIFeedback(isCorrect, 'Image match for word "' + (q ? q.word.word : '') + '"', qid);
  } else {
    showSimpleFeedback(isCorrect);
  }
  updateProgress();
}

function selectMC(qid, chosenId, correctId) {
  document.querySelectorAll('.opt').forEach(o => { o.disabled = true; });
  const isCorrect = chosenId === correctId;
  document.querySelectorAll('.opt').forEach(o => {
    if (o.dataset.chosen === chosenId) o.classList.add(isCorrect ? 'correct' : 'incorrect');
    if (!isCorrect && o.dataset.chosen === correctId) o.classList.add('correct');
  });
  state.answers[qid] = {value:chosenId, correct:isCorrect, score:isCorrect?1:0};
  document.getElementById('btn-next').disabled = false;
  const q = QUESTIONS.find(q => q.id === qid);
  if (IS_FORMATIVE) {
    getAIFeedback(isCorrect, 'Word: "' + (q ? q.word.word : '') + '"', qid);
  } else {
    showSimpleFeedback(isCorrect);
  }
  updateProgress();
}

function showSimpleFeedback(isCorrect) {
  document.getElementById('feedback-area').innerHTML =
    '<div class="feedback-box ' + (isCorrect ? 'fb-correct' : 'fb-incorrect') + '">'
    + '<div class="fb-header" style="color:' + (isCorrect ? 'var(--green)' : 'var(--coral)') + ';">'
    + (isCorrect ? '✓ Correct!' : '✗ Not quite — see the correct answer above.') + '</div>'
    + '</div>';
}

function insertWord(word, idx) {
  const ta = document.getElementById('written-response');
  if (!ta) return;
  const pos = ta.selectionStart;
  const before = ta.value.substring(0, pos);
  const after = ta.value.substring(pos);
  const space = before.length && !before.endsWith(' ') ? ' ' : '';
  ta.value = before + space + word + ' ' + after;
  const btn = document.getElementById('wb' + idx);
  if (btn) btn.style.opacity = '.4';
  ta.focus();
}

async function submitWritten() {
  const ta = document.getElementById('written-response');
  const value = ta ? ta.value.trim() : '';
  if (!value) { if(ta) ta.style.borderColor='var(--red)'; return; }
  ta.disabled = true;
  const btn = document.querySelector('button[onclick="submitWritten()"]');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  let recordingUrl = null;
  if (state.audioBlob) recordingUrl = await uploadRecording();
  state.answers['t3_write'] = {value, score:null, type:'written', recordingUrl};
  document.getElementById('btn-next').disabled = false;
  state.audioBlob = null;
  if (IS_FORMATIVE) getAIWrittenFeedback(value);
}

function restoreAnswer(q) {
  if (q.type === 'vocab-write') {
    const ta = document.getElementById('written-response');
    const ans = state.answers[q.id];
    if (ta && ans) { ta.value = ans.value; ta.disabled = true; }
  }
}

// ── AI FEEDBACK ──────────────────────────────────────────
function showFbLoading() {
  document.getElementById('feedback-area').innerHTML =
    '<div class="feedback-box fb-loading"><span class="spinner"></span> <span style="font-size:13px;color:var(--gray-500);margin-left:8px;">Getting feedback...</span></div>';
}

async function getAIFeedback(isCorrect, context, qid) {
  showFbLoading();
  const langName = document.getElementById('lang-select').selectedOptions[0].text;
  const prompt = 'You are a warm ELD teacher giving feedback to a newcomer student. Student ' + (isCorrect?'correctly':'incorrectly') + ' answered. Context: ' + context + '. Give 1-2 encouraging sentences in English' + (state.lang!=='en'?', then translate to '+langName:'') + '. No bullets.';
  try {
    const res = await fetch(CLAUDE_API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    const text = (data.content && data.content[0] && data.content[0].text) || (isCorrect ? 'Great job!' : 'Keep practicing!');
    const lines = text.split('\n').filter(function(l){return l.trim();});
    const eng = lines.slice(0,2).join(' ');
    const nat = lines.slice(2).join(' ');
    document.getElementById('feedback-area').innerHTML =
      '<div class="feedback-box ' + (isCorrect?'fb-correct':'fb-incorrect') + '">'
      + '<div class="fb-header" style="color:' + (isCorrect?'var(--green)':'var(--coral)') + ';">' + (isCorrect?'Correct!':'Not quite') + '</div>'
      + '<div class="fb-text">' + eng + '</div>'
      + (nat ? '<div class="fb-native">🌍 ' + nat + '</div>' : '')
      + '</div>';
  } catch(e) {
    document.getElementById('feedback-area').innerHTML =
      '<div class="feedback-box ' + (isCorrect?'fb-correct':'fb-incorrect') + '">'
      + '<div class="fb-header" style="color:' + (isCorrect?'var(--green)':'var(--coral)') + ';">' + (isCorrect?'✓ Correct!':'Not quite — keep trying!') + '</div></div>';
  }
}

async function getAIWrittenFeedback(text) {
  showFbLoading();
  const words = lessonVocab.map(function(w){return w.word;}).join(', ');
  const langName = document.getElementById('lang-select').selectedOptions[0].text;
  const prompt = 'ELD teacher feedback. Lesson words: ' + words + '. Student wrote: "' + text + '". Give 1 strength + 1 tip. Score vocab 1-4.' + (state.lang!=='en'?' Then translate to '+langName+'.':'') + ' JSON only: {"strength":"...","tip":"...","score":1' + (state.lang!=='en'?',"native":"..."':'') + '}';
  try {
    const res = await fetch(CLAUDE_API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    let raw = (data.content && data.content[0] && data.content[0].text) || '{}';
    raw = raw.replace(/```json|```/g,'').trim();
    const fb = JSON.parse(raw);
    document.getElementById('feedback-area').innerHTML =
      '<div class="feedback-box fb-neutral">'
      + '<div class="fb-header" style="color:var(--amber);">Writing Feedback</div>'
      + '<div class="fb-text"><strong>Strong:</strong> ' + (fb.strength||'') + '</div>'
      + '<div class="fb-text" style="margin-top:.25rem;"><strong>Try:</strong> ' + (fb.tip||'') + '</div>'
      + '<div style="font-size:.8rem;color:var(--teal-dark);font-weight:700;margin-top:.5rem;">Vocabulary: ' + (fb.score||'—') + '/4</div>'
      + (fb.native ? '<div class="fb-native">🌍 ' + fb.native + '</div>' : '')
      + '</div>';
    state.answers['t3_write'].score = fb.score;
  } catch(e) {
    document.getElementById('feedback-area').innerHTML =
      '<div class="feedback-box fb-neutral"><div class="fb-text">Response saved. Your teacher will review it.</div></div>';
  }
}

// ── RECORDING ────────────────────────────────────────────
async function uploadRecording() {
  if (!state.audioBlob) return null;
  const name = (state.studentName||'student').replace(/\s+/g,'_');
  const fn = name + '_U' + UNIT + 'L' + LESSON + '_' + Date.now() + '.webm';
  try {
    const res = await fetch(SUPA_URL + '/storage/v1/object/assessment-recordings/' + fn, {
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'audio/webm','x-upsert':'true'},
      body:state.audioBlob
    });
    if (res.ok) return SUPA_URL + '/storage/v1/object/public/assessment-recordings/' + fn;
  } catch(e) {}
  return null;
}

async function toggleRecording() {
  const btn = document.getElementById('rec-btn');
  const status = document.getElementById('rec-status');
  if (!state.recording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      state.mediaRecorder = new MediaRecorder(stream);
      state.audioChunks = [];
      state.mediaRecorder.ondataavailable = function(e) { state.audioChunks.push(e.data); };
      state.mediaRecorder.onstop = function() {
        state.audioBlob = new Blob(state.audioChunks, {type:'audio/webm'});
        const url = URL.createObjectURL(state.audioBlob);
        const audio = document.getElementById('audio-playback');
        if (audio) { audio.src=url; audio.style.display='block'; }
        clearInterval(state.timerInterval);
        status.textContent = 'Recording saved!';
        btn.className = 'record-btn record-done'; btn.textContent = '✓';
      };
      state.mediaRecorder.start();
      state.recording = true;
      btn.className = 'record-btn record-recording'; btn.textContent = '⏹';
      status.textContent = 'Recording... tap to stop';
      state.timerSeconds = 0;
      state.timerInterval = setInterval(function() {
        state.timerSeconds++;
        const m = Math.floor(state.timerSeconds/60), s = state.timerSeconds%60;
        const el = document.getElementById('rec-timer');
        if (el) el.textContent = m + ':' + s.toString().padStart(2,'0');
        if (state.timerSeconds >= 120) stopRecording();
      }, 1000);
    } catch(e) { status.textContent = 'Microphone not available.'; }
  } else { stopRecording(); }
}

function stopRecording() {
  if (state.mediaRecorder && state.recording) {
    state.mediaRecorder.stop();
    state.recording = false;
    state.mediaRecorder.stream.getTracks().forEach(function(t){t.stop();});
  }
}

// ── NAVIGATION ───────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el = document.getElementById('screen-' + id);
  if (el) el.classList.add('active');
  state.screen = id;
  updateProgress();
  window.scrollTo(0,0);
}

function startAssessment() {
  state.studentName = document.getElementById('student-name').value.trim();
  state.studentPeriod = document.getElementById('student-period').value;
  state.lang = document.getElementById('lang-select').value;
  buildQuestions();
  goToQuestion(0);
}

function goToQuestion(idx) {
  state.currentQ = idx;
  renderQuestion(QUESTIONS[idx]);
  showScreen('question');
}

function goNext() {
  var next = state.currentQ + 1;
  if (next >= QUESTIONS.length) { finishAssessment(); return; }
  goToQuestion(next);
}

function goBack() {
  if (state.currentQ > 0) goToQuestion(state.currentQ - 1);
  else showScreen('intro');
}

function updateProgress() {
  var total = QUESTIONS.length || 1;
  var answered = Object.keys(state.answers).length;
  var pct = Math.round((answered/total)*100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-label').textContent = state.screen === 'question' ? 'Q' + (state.currentQ+1) + ' of ' + total : 'Lesson ' + LESSON;
  var dots = document.getElementById('tier-dots');
  if (dots) {
    dots.innerHTML = QUESTIONS.map(function(q,i) {
      var cls = state.answers[q.id] ? 'done' : i===state.currentQ ? 'active' : '';
      return '<div class="tier-dot ' + cls + '"></div>';
    }).join('');
  }
}

// ── FINISH ────────────────────────────────────────────────
async function finishAssessment() {
  var mcQs = QUESTIONS.filter(function(q){return q.tier < 3;});
  var correct = mcQs.filter(function(q){return state.answers[q.id] && state.answers[q.id].correct;}).length;
  var total = mcQs.length;
  var pct = total ? Math.round((correct/total)*100) : 0;
  document.getElementById('final-score').textContent = correct + '/' + total;
  document.getElementById('final-pct').textContent = pct + '% correct';
  await saveResults(correct, total, pct);
  showScreen('complete');
}

async function saveResults(correct, total, pct) {
  var timestamp = new Date().toISOString();
  var rows = QUESTIONS.map(function(q) {
    var ans = state.answers[q.id] || {};
    return {
      student_name: state.studentName,
      period: state.studentPeriod,
      unit: UNIT,
      lesson_num: LESSON,
      mode: MODE,
      question_id: q.id,
      question_type: q.type,
      word: q.word ? q.word.word : null,
      student_answer: typeof ans.value === 'object' ? JSON.stringify(ans.value) : (ans.value || null),
      is_correct: ans.correct === true ? true : ans.correct === false ? false : null,
      score: ans.score !== undefined ? ans.score : null,
      recording_url: ans.recordingUrl || null,
      timestamp: timestamp
    };
  });
  try {
    await fetch(SUPA_URL + '/rest/v1/lesson_assessment_results', {
      method: 'POST',
      headers: {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify(rows)
    });
  } catch(e) { console.warn('Save failed:', e); }
}

updateProgress();
</script>
